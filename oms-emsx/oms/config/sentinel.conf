# Redis Sentinel configuration for OMS EMSX.
#
# Topology:
#   - primary  on 127.0.0.1:6379
#   - replica  on 127.0.0.1:6380 (started with --replicaof 127.0.0.1 6379)
#   - sentinel on this process, port 26379
#
# Failover budget: detect within 2s, complete within 5s.

port 26379

sentinel monitor mymaster 127.0.0.1 6379 1
sentinel down-after-milliseconds mymaster 2000
sentinel failover-timeout mymaster 5000
sentinel parallel-syncs mymaster 1

# Quiet logs; enable for debugging.
loglevel notice
